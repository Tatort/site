baseurl: "www.allcology.com"
languageCode: en-us
title: ALLcology Lab
theme: blackburn
author: Travis M. Thomas
copyright: '&copy; 2022. All rights reserved.'
canonifyurls: yes
paginate: 10
ignoreFiles: = ["\\.Rmd$", "\\.Rmarkdown$", "_files$", "_cache$"]

indexes:
  tag: tags
  topic: topics
params:
  brand: ALLcology
  dateFormat: 02 Jan 2006, 15:04
  disqus: Your Disqus shortname
  googleAnalytics: Your Google Analytics tracking ID
  highlightjs: androidstudio
  subtitle: UF / Nature Coast Biological Station
                
menu:
  main:
    - identifier: about
      name: About
      pre: <i class='fa fa-list fa-fw'></i>
      url: /about/
      weight: 1
    - identifier: team
      name: Team
      pre: <i class='fa fa-user fa-fw'></i>
      url: /team/
      weight: 2
      - identifier: projects
      name: Projects
      pre: <i class='fa fa-list fa-fw'></i>
      url: /projects/
      weight: 3
      - identifier: posts
      name: Posts
      pre: <i class='fa fa-pencil fa-fw'></i>
      url: /post/
      weight: 4
      
social:
  facebook: '*'
  github: Tatort
  instagram: '*'
  twitter: '*'

markup:
  goldmark:
    renderer:
      unsafe: true